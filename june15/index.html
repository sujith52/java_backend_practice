<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration application</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            padding: 20px;
            color: whitesmoke;
            font-size: 30px;
        }
        
    </style>
</head>
<body bgcolor="green">
   
    <form action="post" >
         <h1>Registration application :</h1>
        <table>
            <tr>
                <td>User name :</td>
                <td><input type="text" name="uname"></td>
            </tr>
            <tr>
                <td>User Email Id :</td>
                <td><input type="text" name="uemail"></td>
            </tr>
            <tr>
                <td>User Password :</td>
                <td><input type="text" name="upassword"></td>
            </tr>
            <tr>
                <td>User City :</td>
                <td><input type="text" name="ucity"></td>
            </tr>
            <tr>
                <td><input type="submit"></td>
            </tr>
        </table>
    </form>
</body>
</html>
